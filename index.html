<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Management System - Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Content Management System (CMS)</h1>
        <nav>
            <a href="index.html" class="active">Content List</a>
            <a href="add-content.html">Add Content</a>
        </nav>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="search-input" placeholder="Search content title...">
            <button id="search-btn">Search</button>
        </div>

        <div class="content-list" id="content-list">
            <!-- Content items load from local storage via JS -->
            <div class="content-item empty">
                No content available, <a href="add-content.html">click to add</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Content Management System | Replace styles after design finalization</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
