<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Content - CMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Add New Content</h1>
        <nav>
            <a href="index.html">Content List</a>
            <a href="add-content.html" class="active">Add Content</a>
        </nav>
    </header>

    <main class="container">
        <form id="add-content-form" class="content-form">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required placeholder="Enter content title">
            </div>
            <div class="form-group">
                <label for="content">Content:</label>
                <textarea id="content" name="content" required rows="8" placeholder="Enter content details"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit">Save Content</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </main>

    <footer class="footer">
        <p>Content Management System | Replace styles after design finalization</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
